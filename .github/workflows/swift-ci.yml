name: Swift CI

on:
  # pull_request: # Disabled temporarily
  #   branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Show Xcode version
      run: xcodebuild -version
      
    - name: List available schemes
      run: xcodebuild -list -project Empy_Swift.xcodeproj
      
    - name: Build
      run: |
        xcodebuild clean build \
          -project Empy_Swift.xcodeproj \
          -scheme Empy_Swift \
          -destination 'platform=macOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          -quiet
      
    - name: Detect test configuration
      id: test-config
      run: |
        SCHEME_FILE="Empy_Swift.xcodeproj/xcshareddata/xcschemes/Empy_Swift.xcscheme"
        if grep -q '<TestableReference' "$SCHEME_FILE"; then
          echo "has_tests=true" >> "$GITHUB_OUTPUT"
          echo "Testables found in scheme; tests will run."
        else
          echo "has_tests=false" >> "$GITHUB_OUTPUT"
          echo "No testables configured in scheme; skipping test execution."
        fi

    - name: Run Tests
      if: steps.test-config.outputs.has_tests == 'true'
      run: |
        xcodebuild test \
          -project Empy_Swift.xcodeproj \
          -scheme Empy_Swift \
          -destination 'platform=macOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          -quiet

    - name: Report test skip
      if: steps.test-config.outputs.has_tests != 'true'
      run: echo "Tests are not configured for scheme Empy_Swift; CI currently validates build + lint only."
      
    - name: SwiftLint
      run: |
        if command -v swiftlint &> /dev/null; then
          swiftlint --config .swiftlint.yml
        else
          echo "SwiftLint not installed, skipping..."
        fi
